<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ayenda Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  :root{--black:#0a0a0a;--white:#f5f2ed;--green:#4a7c59;--green-light:#6aab7a;--gray:#1a1a1a;--gray2:#252525;--text-muted:#666;--border:#1e1e1e;--new:#e8a838;--red:#c0392b;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;min-height:100vh}
  .top-bar{background:var(--gray);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:12px 16px;position:sticky;top:0;z-index:20;flex-wrap:wrap;gap:8px}
  .top-logo{font-family:'Playfair Display',serif;font-size:16px;font-weight:900;letter-spacing:3px;text-transform:uppercase}
  .top-logo span{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:300;color:var(--green-light);letter-spacing:3px;display:block}
  .top-right{display:flex;align-items:center;gap:10px}
  .live-dot{width:8px;height:8px;background:var(--green-light);border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}
  .live-label{font-size:10px;color:var(--green-light);letter-spacing:2px;text-transform:uppercase}
  .clock{font-size:12px;color:var(--text-muted)}
  .sound-btn{background:rgba(74,124,89,0.2);border:1px solid rgba(74,124,89,0.5);border-radius:20px;color:var(--green-light);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;padding:5px 12px}
  .page-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--gray);position:sticky;top:53px;z-index:19;overflow-x:auto;scrollbar-width:none}
  .page-tabs::-webkit-scrollbar{display:none}
  .page-tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:1.5px;padding:12px 16px;text-transform:uppercase;transition:all 0.2s;white-space:nowrap}
  .page-tab.active{color:var(--white);border-bottom-color:var(--green)}
  .badge{background:var(--new);border-radius:10px;color:#000;font-size:10px;font-weight:700;margin-left:6px;padding:1px 6px}
  .page{display:none;padding:16px}.page.active{display:block}
  .notif-card{background:var(--gray2);border-radius:12px;border-left:3px solid var(--new);display:flex;align-items:center;justify-content:space-between;padding:14px 16px;margin-bottom:10px;animation:cardIn 0.3s ease}
  .notif-card.bill{border-left-color:var(--green)}
  @keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .notif-left{display:flex;align-items:center;gap:12px}
  .notif-icon{font-size:22px}
  .notif-table{font-family:'Playfair Display',serif;font-size:18px;font-weight:700}
  .notif-label{font-size:11px;color:var(--text-muted);margin-top:2px}
  .notif-time{font-size:11px;color:var(--text-muted)}
  .dismiss-btn{background:var(--gray);border:1px solid var(--border);border-radius:8px;color:var(--text-muted);cursor:pointer;font-size:11px;padding:6px 12px;font-family:'DM Sans',sans-serif}
  .no-notifs{text-align:center;padding:40px;color:var(--text-muted);font-size:13px}
  .filter-bar{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
  .filter-bar::-webkit-scrollbar{display:none}
  .filter-btn{background:none;border:1px solid var(--border);border-radius:20px;color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:1px;padding:6px 14px;white-space:nowrap;transition:all 0.2s}
  .filter-btn.active{background:var(--gray2);border-color:#444;color:var(--white)}
  .orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .order-card{background:var(--gray2);border-radius:14px;border:1px solid var(--border);overflow:hidden;animation:cardIn 0.3s ease}
  .order-card.status-new{border-top:3px solid var(--new)}
  .order-card.status-preparing{border-top:3px solid var(--green)}
  .order-card.status-done{border-top:3px solid #333;opacity:0.45}
  .card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px;border-bottom:1px solid var(--border)}
  .table-num{font-family:'Playfair Display',serif;font-size:20px;font-weight:900}
  .guest-name{font-size:11px;color:var(--text-muted);margin-top:2px}
  .status-badge{border-radius:20px;font-size:10px;font-weight:600;letter-spacing:1.5px;padding:3px 9px;text-transform:uppercase}
  .status-badge.new{background:rgba(232,168,56,0.15);color:var(--new);border:1px solid rgba(232,168,56,0.3)}
  .status-badge.preparing{background:rgba(74,124,89,0.15);color:var(--green-light);border:1px solid rgba(74,124,89,0.3)}
  .status-badge.done{background:rgba(100,100,100,0.1);color:#555;border:1px solid #333}
  .card-meta{padding:6px 14px;font-size:10px;color:var(--text-muted);border-bottom:1px solid var(--border)}
  .card-meta span{color:#aaa}
  .card-items{padding:8px 14px}
  .order-line{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border);gap:8px}
  .order-line:last-child{border-bottom:none}
  .line-name{font-size:12px;color:var(--white);flex:1}
  .line-sub{font-size:10px;color:var(--text-muted);margin-top:1px}
  .line-qty{font-size:11px;font-weight:600;color:var(--green-light);flex-shrink:0;background:rgba(74,124,89,0.15);border-radius:4px;padding:2px 6px}
  .card-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 12px;border-top:1px solid var(--border);gap:8px}
  .card-total{font-family:'Playfair Display',serif;font-size:15px;font-weight:700}
  .card-time{font-size:10px;color:var(--text-muted)}
  .action-btn{border:none;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;padding:7px 12px;text-transform:uppercase;transition:all 0.2s}
  .btn-start{background:var(--green);color:white}
  .btn-done{background:#2a2a2a;border:1px solid #444;color:#888}
  .action-btn:active{transform:scale(0.95)}
  .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
  .empty-icon{font-size:40px;margin-bottom:12px;opacity:0.3}
  .stock-section{margin-bottom:20px}
  .stock-section-title{font-family:'Playfair Display',serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--green-light);padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:2px}
  .stock-item{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
  .stock-item-name{font-size:13px;color:var(--white)}
  .stock-item-weight{font-size:10px;color:var(--text-muted);margin-top:2px}
  .stock-toggle{background:none;border:1px solid var(--green);border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;padding:6px 14px;text-transform:uppercase;transition:all 0.2s;color:var(--green-light)}
  .stock-toggle.oos{background:rgba(192,57,43,0.15);border-color:rgba(192,57,43,0.5);color:var(--red)}
  .stock-toggle:active{transform:scale(0.95)}
  .analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
  .stat-card{background:var(--gray2);border-radius:12px;padding:14px}
  .stat-card.wide{grid-column:1/-1}
  .stat-label{font-size:10px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
  .stat-value{font-family:'Playfair Display',serif;font-size:24px;font-weight:700}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .bar-label{font-size:12px;color:var(--white);min-width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{flex:1;background:var(--border);border-radius:4px;height:6px}
  .bar-fill{background:var(--green);border-radius:4px;height:6px}
  .bar-count{font-size:11px;color:var(--text-muted);min-width:24px;text-align:right}
  .notif-toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:30px;font-size:13px;font-weight:600;z-index:500;display:none;white-space:nowrap}
  .notif-toast.show{display:block;animation:fadeInOut 3s ease forwards}
  .notif-toast.waiter{background:var(--new);color:#000}
  .notif-toast.bill{background:var(--green);color:white}
  @keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(-10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div class="notif-toast" id="notifToast"></div>
<div class="top-bar">
  <div class="top-logo">Ayenda<span>Kitchen - Reception</span></div>
  <div class="top-right">
    <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔔 Sound ON</button>
    <div class="live-dot"></div><div class="live-label">Live</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</div>
<div class="page-tabs">
  <button class="page-tab active" onclick="switchPage('orders',this)">Orders <span class="badge" id="newBadge" style="display:none">0</span></button>
  <button class="page-tab" onclick="switchPage('notifs',this)">Calls <span class="badge" id="notifBadge" style="display:none">0</span></button>
  <button class="page-tab" onclick="switchPage('stock',this)">Stock</button>
  <button class="page-tab" onclick="switchPage('analytics',this)">Analytics</button>
</div>
<div class="page active" id="page-orders">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('new',this)">New</button>
    <button class="filter-btn" onclick="setFilter('preparing',this)">Preparing</button>
    <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
  </div>
  <div class="orders-grid" id="ordersGrid"><div class="empty-state"><div class="empty-icon">🍽</div><div>Waiting for orders...</div></div></div>
</div>
<div class="page" id="page-notifs">
  <div id="notifsGrid"><div class="no-notifs">No calls yet</div></div>
</div>
<div class="page" id="page-stock">
  <div id="stockPanel"></div>
</div>
<div class="page" id="page-analytics">
  <div class="analytics-grid">
    <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-value" id="statOrders">0</div></div>
    <div class="stat-card"><div class="stat-label">Total Revenue</div><div class="stat-value" id="statRevenue">0k</div><div style="font-size:11px;color:var(--text-muted)">IDR</div></div>
    <div class="stat-card wide"><div class="stat-label">Top Items</div><div id="topItems"><div style="color:var(--text-muted);font-size:12px;margin-top:8px">No data yet</div></div></div>
    <div class="stat-card wide"><div class="stat-label">Busiest Tables</div><div id="topTables"><div style="color:var(--text-muted);font-size:12px;margin-top:8px">No data yet</div></div></div>
    <div class="stat-card wide"><div class="stat-label">Popular Sauces</div><div id="topSauces"><div style="color:var(--text-muted);font-size:12px;margin-top:8px">No data yet</div></div></div>
  </div>
</div>
<script>
var firebaseConfig={apiKey:"AIzaSyCteDaRz4XOcfrbB1l2QBY2nHYMz1-RrXk",authDomain:"ayenda-cafe.firebaseapp.com",databaseURL:"https://ayenda-cafe-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"ayenda-cafe",storageBucket:"ayenda-cafe.firebasestorage.app",messagingSenderId:"6320724772",appId:"1:6320724772:web:45ec3e511423ed116231b1"};
firebase.initializeApp(firebaseConfig);
var db=firebase.database();
var allOrders={},allNotifs={},currentFilter='all',knownOrderIds=new Set(),knownNotifIds=new Set(),outOfStock={};
var soundEnabled=true,audioCtx=null;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playAlert(){if(!soundEnabled)return;try{var ctx=getAudioCtx();[0,0.35,0.7].forEach(function(delay){var osc=ctx.createOscillator();var gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=880;osc.type='sine';gain.gain.setValueAtTime(0.5,ctx.currentTime+delay);gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.3);osc.start(ctx.currentTime+delay);osc.stop(ctx.currentTime+delay+0.3);});}catch(e){}}
function toggleSound(){try{getAudioCtx();}catch(e){}soundEnabled=!soundEnabled;var btn=document.getElementById('soundBtn');btn.textContent=soundEnabled?'🔔 Sound ON':'🔕 Sound OFF';btn.style.color=soundEnabled?'#6aab7a':'#666';btn.style.borderColor=soundEnabled?'rgba(74,124,89,0.5)':'#333';btn.style.background=soundEnabled?'rgba(74,124,89,0.2)':'none';}
var menuAll={proteins:[{id:'p1',name:'Grilled Beef Patties',weight:'160g'},{id:'p2',name:'Marinated Chicken Breast',weight:'250g'},{id:'p3',name:'Grilled Salmon Fillet',weight:'200g'},{id:'p4',name:'Spiced Tempeh',weight:'160g'},{id:'p5',name:'Spiced Tofu',weight:'160g'},{id:'p6',name:'Free Range Eggs',weight:'3pc'},{id:'p7',name:'Grass Fed Rib Eye Steak',weight:'200g'}],carbs:[{id:'c1',name:'White Rice',weight:'200g'},{id:'c2',name:'Brown Rice',weight:'200g'},{id:'c3',name:'Roasted Potatoes',weight:'200g'},{id:'c4',name:'Baked Sweet Potatoes',weight:'200g'},{id:'c5',name:'Mashed Potato',weight:'200g'},{id:'c6',name:'Toasted Sourdough Bread',weight:'1pc'},{id:'c7',name:'Raw Honey',weight:'15ml'}],fats:[{id:'f1',name:'Avocado',weight:'100g'},{id:'f2',name:'Butter',weight:'15g'},{id:'f3',name:'Feta Cheese',weight:'35g'},{id:'f4',name:'Cottage Cheese',weight:'50g'},{id:'f5',name:'Grass Fed Butter',weight:'15g'}],veg:[{id:'v1',name:'Mixed Salad',weight:'100g'},{id:'v2',name:'Sauted Mushroom',weight:'200g'},{id:'v3',name:'Sauted Spinach',weight:'100g'},{id:'v4',name:'Roasted Broccoli',weight:'100g'},{id:'v5',name:'Roasted Beetroot',weight:'100g'},{id:'v6',name:'Grilled Zucchini',weight:'100g'},{id:'v7',name:'Grilled Cherry Tomato',weight:'100g'}],fruit:[{id:'fr1',name:'Watermelon',weight:'200g'},{id:'fr2',name:'Pineapple',weight:'150g'},{id:'fr3',name:'Strawberry',weight:'100g'},{id:'fr4',name:'Papaya',weight:'100g'},{id:'fr5',name:'Banana',weight:'200g'},{id:'fr6',name:'Dragon Fruit',weight:'100g'}],probiotic:[{id:'pb1',name:'Sauerkraut',weight:'50g'},{id:'pb2',name:'Kimchi',weight:'80g'},{id:'pb3',name:'Pickled Cucumber Onion',weight:'60g'}],sauces:[{id:'s1',name:'Guacamole'},{id:'s2',name:'BBQ'},{id:'s3',name:'Hommus'},{id:'s4',name:'Sweet Chilli'},{id:'s5',name:'Honey Mustard'},{id:'s6',name:'Soy Ginger'},{id:'s7',name:'Sriracha'},{id:'s8',name:'Aioli'},{id:'s9',name:'Sambal'},{id:'s10',name:'Sour Cream'}],coffee:[{id:'d-c1',name:'Americano'},{id:'d-c2',name:'Espresso'},{id:'d-c3',name:'Double Espresso'},{id:'d-c4',name:'Espresso Orange'},{id:'d-c5',name:'Long Black'},{id:'d-c6',name:'Cappuccino'},{id:'d-c7',name:'Latte'},{id:'d-c8',name:'Flat White'}],tea:[{id:'d-t1',name:'Green Tea'},{id:'d-t2',name:'Flower Tea'},{id:'d-t3',name:'Earl Grey Tea'},{id:'d-t4',name:'Ginger Tea'},{id:'d-t5',name:'Lemon Grass'},{id:'d-t6',name:'Matcha Latte'},{id:'d-t7',name:'Matcha Orange'}],juice:[{id:'d-j1',name:'Watermelon Juice'},{id:'d-j2',name:'Mango Juice'},{id:'d-j3',name:'Avocado Juice'},{id:'d-j4',name:'Banana Juice'},{id:'d-j5',name:'Pineapple Juice'},{id:'d-j6',name:'Mixed Fruit Juice'},{id:'d-j7',name:'Dragon Fruit Juice'}],cold:[{id:'d-b1',name:'Coke'},{id:'d-b2',name:'Coke Zero'},{id:'d-b3',name:'Sprite Zero'},{id:'d-b4',name:'Pocari'},{id:'d-b5',name:'Aqua'},{id:'d-b6',name:'Sparkling Water'}],shakes:[{id:'d-s1',name:'Choco Shake'},{id:'d-s2',name:'Yellow Vit'},{id:'d-s3',name:'Red Dragon'},{id:'d-add1',name:'+ Soy Milk'},{id:'d-add2',name:'+ Almond Milk'},{id:'d-add3',name:'+ 1 Scoop Protein'}]};
function switchPage(id,btn){document.querySelectorAll('.page-tab').forEach(function(t){t.classList.remove('active');});document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});btn.classList.add('active');document.getElementById('page-'+id).classList.add('active');if(id==='analytics')renderAnalytics();}
function setFilter(f,btn){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderGrid();}
function timeAgo(ts){var d=Math.floor((Date.now()-ts)/1000);if(d<60)return d+'s';if(d<3600)return Math.floor(d/60)+'m';return Math.floor(d/3600)+'h';}
function fmtTime(ts){var d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
db.ref('orders').on('value',function(snap){var data=snap.val()||{};var newIds=Object.keys(data).filter(function(id){return !knownOrderIds.has(id)&&data[id].status==='new';});if(newIds.length>0&&knownOrderIds.size>0){showNotifToast('New order incoming!','waiter');playAlert();}Object.keys(data).forEach(function(id){knownOrderIds.add(id);});allOrders=data;renderGrid();updateOrderBadge();});
db.ref('outOfStock').on('value',function(snap){outOfStock=snap.val()||{};renderStockPanel();});
db.ref('notifications').on('value',function(snap){var data=snap.val()||{};var newIds=Object.keys(data).filter(function(id){return !knownNotifIds.has(id);});newIds.forEach(function(id){knownNotifIds.add(id);if(knownNotifIds.size>newIds.length){var n=data[id];showNotifToast(n.type==='bill'?'Table '+n.table+' wants to pay':'Table '+n.table+' calling waiter',n.type==='bill'?'bill':'waiter');}});allNotifs=data;renderNotifs();});
function updateOrderBadge(){var newCount=Object.values(allOrders).filter(function(o){return o.status==='new';}).length;var badge=document.getElementById('newBadge');badge.style.display=newCount>0?'inline':'none';badge.textContent=newCount;}
function renderGrid(){var grid=document.getElementById('ordersGrid');var entries=Object.entries(allOrders).filter(function(e){return currentFilter==='all'||e[1].status===currentFilter;}).sort(function(a,b){var s={new:0,preparing:1,done:2};var d=(s[a[1].status]||0)-(s[b[1].status]||0);return d!==0?d:a[1].timestamp-b[1].timestamp;});if(!entries.length){grid.innerHTML='<div class="empty-state"><div class="empty-icon">🍽</div><div>No orders</div></div>';return;}grid.innerHTML=entries.map(function(e){var id=e[0],o=e[1];var statusLabel={new:'New',preparing:'Preparing',done:'Done'}[o.status]||o.status;var items=(o.items||[]).map(function(item){return '<div class="order-line"><div><div class="line-name">'+item.name+(item.weight?' - '+item.weight:'')+(item.temp?' - '+(item.temp==='hot'?'Hot':'Ice'):'')+'</div>'+(item.sub?'<div class="line-sub">'+item.sub+'</div>':'')+'</div><div class="line-qty">x'+item.qty+'</div></div>';}).join('');var meta=[];if(o.seasoning&&o.seasoning!=='standard')meta.push('Seasoning: <span>'+o.seasoning+'</span>');if(o.notes)meta.push('Notes: <span>'+o.notes+'</span>');var metaHtml=meta.length?'<div class="card-meta">'+meta.join(' - ')+'</div>':'';var action='';if(o.status==='new')action='<button class="action-btn btn-start" onclick="updateStatus(\''+id+'\',\'preparing\')">Start</button>';else if(o.status==='preparing')action='<button class="action-btn btn-done" onclick="updateStatus(\''+id+'\',\'done\')">Done</button>';else action='<span style="font-size:10px;color:#444">COMPLETE</span>';return '<div class="order-card status-'+o.status+'"><div class="card-header"><div><div class="table-num">Table '+o.table+'</div><div class="guest-name">'+(o.name||'Guest')+'</div></div><div class="status-badge '+o.status+'">'+statusLabel+'</div></div>'+metaHtml+'<div class="card-items">'+items+'</div><div class="card-footer"><div><div class="card-total">IDR '+(o.total||0)+'k</div><div class="card-time">'+fmtTime(o.timestamp)+' - '+timeAgo(o.timestamp)+' ago</div></div>'+action+'</div></div>';}).join('');}
function updateStatus(id,status){db.ref('orders/'+id).update({status:status});}
function renderNotifs(){var grid=document.getElementById('notifsGrid');var entries=Object.entries(allNotifs).sort(function(a,b){return b[1].timestamp-a[1].timestamp;});var badge=document.getElementById('notifBadge');badge.style.display=entries.length>0?'inline':'none';badge.textContent=entries.length;if(!entries.length){grid.innerHTML='<div class="no-notifs">No calls yet</div>';return;}grid.innerHTML=entries.map(function(e){var id=e[0],n=e[1];return '<div class="notif-card '+n.type+'"><div class="notif-left"><div class="notif-icon">'+(n.type==='bill'?'💳':'🔔')+'</div><div><div class="notif-table">Table '+n.table+'</div><div class="notif-label">'+(n.type==='bill'?'Requesting bill':'Calling waiter')+'</div></div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px"><div class="notif-time">'+timeAgo(n.timestamp)+' ago</div><button class="dismiss-btn" onclick="dismissNotif(\''+id+'\')">Dismiss</button></div></div>';}).join('');}
function dismissNotif(id){db.ref('notifications/'+id).remove();}
function renderStockPanel(){var panel=document.getElementById('stockPanel');var catLabels={proteins:'Proteins',carbs:'Carbs',fats:'Fats',veg:'Veg',fruit:'Fruit',probiotic:'Pre/Pro',sauces:'Sauces',coffee:'Coffee',tea:'Tea',juice:'Juice',cold:'Cold',shakes:'Shakes'};panel.innerHTML=Object.keys(menuAll).map(function(cat){return '<div class="stock-section"><div class="stock-section-title">'+catLabels[cat]+'</div>'+menuAll[cat].map(function(item){var isOos=!!outOfStock[item.id];return '<div class="stock-item"><div><div class="stock-item-name">'+item.name+'</div>'+(item.weight?'<div class="stock-item-weight">'+item.weight+'</div>':'')+'</div><button class="stock-toggle'+(isOos?' oos':'')+'" onclick="toggleStock(\''+item.id+'\')">'+(isOos?'Sold Out':'In Stock')+'</button></div>';}).join('')+'</div>';}).join('');}
function toggleStock(itemId){var isOos=!!outOfStock[itemId];if(isOos){delete outOfStock[itemId];db.ref('outOfStock/'+itemId).remove();}else{outOfStock[itemId]=true;db.ref('outOfStock/'+itemId).set(true);}renderStockPanel();}
function renderAnalytics(){var orders=Object.values(allOrders);document.getElementById('statOrders').textContent=orders.length;var rev=orders.reduce(function(s,o){return s+(o.total||0);},0);document.getElementById('statRevenue').textContent=rev+'k';var itemCount={};orders.forEach(function(o){(o.items||[]).forEach(function(i){itemCount[i.name]=(itemCount[i.name]||0)+i.qty;});});var topItems=Object.entries(itemCount).sort(function(a,b){return b[1]-a[1];}).slice(0,8);var maxItem=topItems[0]?topItems[0][1]:1;document.getElementById('topItems').innerHTML=topItems.length?topItems.map(function(e){return '<div class="bar-row"><div class="bar-label">'+e[0]+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(e[1]/maxItem*100)+'%"></div></div><div class="bar-count">'+e[1]+'</div></div>';}).join(''):'<div style="color:var(--text-muted);font-size:12px;margin-top:8px">No data yet</div>';var tableCount={};orders.forEach(function(o){tableCount[o.table]=(tableCount[o.table]||0)+1;});var topTables=Object.entries(tableCount).sort(function(a,b){return b[1]-a[1];}).slice(0,6);var maxTable=topTables[0]?topTables[0][1]:1;document.getElementById('topTables').innerHTML=topTables.length?topTables.map(function(e){return '<div class="bar-row"><div class="bar-label">Table '+e[0]+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(e[1]/maxTable*100)+'%"></div></div><div class="bar-count">'+e[1]+'</div></div>';}).join(''):'<div style="color:var(--text-muted);font-size:12px;margin-top:8px">No data yet</div>';var sauceIds={s1:'Guacamole',s2:'BBQ',s3:'Hommus',s4:'Sweet Chilli',s5:'Honey Mustard',s6:'Soy Ginger',s7:'Sriracha',s8:'Aioli',s9:'Sambal',s10:'Sour Cream'};var sauceCount={};orders.forEach(function(o){(o.items||[]).forEach(function(i){if(sauceIds[i.id])sauceCount[i.id]=(sauceCount[i.id]||0)+i.qty;});});var topSauces=Object.entries(sauceCount).sort(function(a,b){return b[1]-a[1];});var maxS=topSauces[0]?topSauces[0][1]:1;document.getElementById('topSauces').innerHTML=topSauces.length?topSauces.map(function(e){return '<div class="bar-row"><div class="bar-label">'+(sauceIds[e[0]]||e[0])+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(e[1]/maxS*100)+'%"></div></div><div class="bar-count">'+e[1]+'</div></div>';}).join(''):'<div style="color:var(--text-muted);font-size:12px;margin-top:8px">No data yet</div>';}
function showNotifToast(msg,type){var t=document.getElementById('notifToast');t.textContent=msg;t.className='notif-toast '+type+' show';setTimeout(function(){t.className='notif-toast';},3500);}
setInterval(function(){var now=new Date();document.getElementById('clock').textContent=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')+':'+now.getSeconds().toString().padStart(2,'0');},1000);
setInterval(function(){if(Object.keys(allOrders).length>0)renderGrid();},30000);
renderStockPanel();
</script>
